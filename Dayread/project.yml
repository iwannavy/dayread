name: Dayread
options:
  bundleIdPrefix: com.dayread
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: false
  groupSortPosition: top

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: "8.0.0"
  Mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift.git
    from: "4.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "8.0.0"

targets:
  Dayread:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Data
      - path: Models
      - path: Network
      - path: Services
      - path: UIKitViews
      - path: Utils
      - path: Views
      - path: Resources/PrivacyInfo.xcprivacy
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Products.storekit
        buildPhase: resources
      - path: Resources/SessionData
        type: folder
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: ko
        CFBundleDisplayName: "데일리딩"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - dayread
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.538478676772-vc2dvii8emeeb7dgmusodt88lbbt09kq
        GIDClientID: "538478676772-vc2dvii8emeeb7dgmusodt88lbbt09kq.apps.googleusercontent.com"
        SUPABASE_ANON_KEY: "sb_publishable_t-n6fMVyzFRCZO067tyx6w_B244ewmq"
        REVENUECAT_API_KEY: "appl_TaiSCQKgQloWYtCwVhWUNVeZKCa"
        SENTRY_DSN: "https://b6ef1117199547ed31229f9a2f6b5ab3@o4511134087512064.ingest.us.sentry.io/4511134090919936"
        MIXPANEL_TOKEN: "8d7cae4ad62a61e4d2e6418031a4badd"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        NSMicrophoneUsageDescription: "발음 연습과 쉐도잉을 위해 마이크 접근이 필요합니다."
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: Splash
        UIRequiredDeviceCapabilities:
          - arm64
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UIViewControllerBasedStatusBarAppearance: true
    entitlements:
      path: Resources/Dayread.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iwannavy.dayread
        DEVELOPMENT_TEAM: 358S53JSMU
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ENABLE_MODULE_VERIFIER: YES
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: "wholemodule"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: Sentry
        product: Sentry
      - package: Mixpanel
        product: Mixpanel
      - package: GoogleSignIn
        product: GoogleSignIn
